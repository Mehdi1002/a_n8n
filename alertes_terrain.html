<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alertes Terrain</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f1117;
  --surface: #171b26;
  --surface2: #1e2332;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --muted: #7a8099;
  --accent: #4f7cff;
  --accent-dim: rgba(79,124,255,0.12);
  --red: #ff4d6a;
  --red-dim: rgba(255,77,106,0.12);
  --amber: #ffb347;
  --amber-dim: rgba(255,179,71,0.12);
  --green: #3ecf8e;
  --green-dim: rgba(62,207,142,0.12);
  --blue-dim: rgba(79,124,255,0.10);
  --radius: 10px;
  --radius-lg: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── LOADING ── */
#loading-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
  transition: opacity 0.4s;
}
.loader-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
  margin: 0 4px;
}
.loader-dot:nth-child(2) { animation-delay: 0.2s; }
.loader-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

/* ── LOGIN ── */
#login-screen {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: var(--bg);
}
#login-screen.active { display: flex; }

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2rem;
  width: 100%;
  max-width: 360px;
  animation: fadeUp 0.4s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

.login-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 1.75rem;
}
.login-logo-dot {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
}
.login-logo-dot svg { width: 16px; height: 16px; fill: #fff; }
.login-logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
.login-logo-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

.field-label {
  font-size: 11px; font-weight: 500; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 6px;
}
.field-wrap { margin-bottom: 1.25rem; }

select.styled, input.styled {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
  appearance: none;
  -webkit-appearance: none;
}
select.styled:focus, input.styled:focus { border-color: var(--accent); }
.select-wrap { position: relative; }
.select-wrap::after {
  content: '';
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  border: 4px solid transparent;
  border-top-color: var(--muted);
  pointer-events: none;
}

.pin-label-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.pin-dots {
  display: flex; gap: 10px; justify-content: center;
  margin-bottom: 1.25rem;
}
.pin-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent;
  transition: all 0.15s;
}
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.pin-dot.error { background: var(--red); border-color: var(--red); }

.numpad {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px;
  margin-bottom: 1rem;
}
.num-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 18px; font-weight: 500;
  padding: 14px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  text-align: center;
  user-select: none;
}
.num-btn:hover { background: var(--surface); border-color: var(--border2); }
.num-btn:active { transform: scale(0.94); background: var(--accent-dim); }
.num-btn.del { font-size: 13px; color: var(--muted); }
.num-btn.clear { font-size: 12px; color: var(--muted); }

.err-msg {
  font-size: 12px; color: var(--red);
  min-height: 18px; text-align: center;
  margin-bottom: 10px;
}

.btn-primary {
  width: 100%; padding: 12px;
  background: var(--accent);
  border: none; border-radius: var(--radius);
  color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-primary:hover { opacity: 0.88; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── DASHBOARD ── */
#dashboard {
  display: none;
  min-height: 100vh;
  flex-direction: column;
}
#dashboard.active { display: flex; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.25rem;
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-logo { width: 26px; height: 26px; border-radius: 6px; background: var(--accent); display:flex; align-items:center; justify-content:center; }
.topbar-logo svg { width: 13px; height: 13px; fill: #fff; }
.topbar-title { font-size: 14px; font-weight: 600; }
.zone-pill {
  font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace;
  background: var(--accent-dim); color: var(--accent);
  padding: 3px 9px; border-radius: 20px;
  border: 1px solid rgba(79,124,255,0.25);
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.date-txt { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.logout-btn {
  font-size: 12px; padding: 5px 12px;
  background: transparent; border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--muted);
  cursor: pointer; transition: all 0.15s;
}
.logout-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }

.main-content { padding: 1.25rem; flex: 1; }

/* stats */
.stats-grid {
  display: grid; grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 10px; margin-bottom: 1.25rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.stat-lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-val { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; }
.stat-val.c-red { color: var(--red); }
.stat-val.c-amber { color: var(--amber); }
.stat-val.c-green { color: var(--green); }
.stat-val.c-blue { color: var(--accent); }

/* filters */
.filters {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 1rem; align-items: center;
}
.filter-select, .filter-input {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; padding: 7px 12px;
  outline: none;
  transition: border-color 0.2s;
  height: 34px;
  appearance: none; -webkit-appearance: none;
}
.filter-select:focus, .filter-input:focus { border-color: var(--accent); }
.filter-input { flex: 1; min-width: 160px; }
.filter-input::placeholder { color: var(--muted); }

/* sync bar */
.sync-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 1rem; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 12px; color: var(--muted);
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.sync-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
.sync-spacer { flex: 1; }
.refresh-btn {
  font-size: 12px; padding: 4px 10px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--muted); cursor: pointer;
  transition: color 0.15s;
}
.refresh-btn:hover { color: var(--text); }

/* table */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: auto;
}
table {
  width: 100%; border-collapse: collapse;
  font-size: 13px; table-layout: fixed; min-width: 900px;
}
col.c-id    { width: 90px; }
col.c-role  { width: 90px; }
col.c-code  { width: 100px; }
col.c-cli   { width: 130px; }
col.c-prod  { width: 120px; }
col.c-desc  { width: 130px; }
col.c-date  { width: 70px; }
col.c-rep   { width: 110px; }
col.c-com   { width: auto; }

thead th {
  background: var(--surface2);
  padding: 10px 12px;
  text-align: left; font-weight: 500;
  font-size: 11px; color: var(--muted);
  border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: 0.5px;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody td {
  padding: 9px 12px; color: var(--text);
  vertical-align: middle;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
tbody td.wrap { white-space: normal; }

.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 500;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.badge-rup { background: var(--red-dim); color: var(--red); }
.badge-nv  { background: var(--amber-dim); color: var(--amber); }
.badge-ret { background: var(--blue-dim); color: var(--accent); }
.badge-aut { background: rgba(122,128,153,0.12); color: var(--muted); }

.rep-sel {
  font-size: 12px; padding: 4px 8px;
  border-radius: 7px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  outline: none; border: 1px solid transparent;
  transition: all 0.15s; width: 100%;
}
.rep-new      { background: rgba(122,128,153,0.12); color: var(--muted); border-color: rgba(122,128,153,0.2); }
.rep-pending  { background: var(--amber-dim); color: var(--amber); border-color: rgba(255,179,71,0.25); }
.rep-resolved { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,0.25); }
.rep-blocked  { background: var(--red-dim); color: var(--red); border-color: rgba(255,77,106,0.25); }

.comment-input {
  width: 100%; font-size: 12px; padding: 5px 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color 0.15s;
}
.comment-input:focus { border-color: var(--accent); }
.comment-input::placeholder { color: var(--muted); }

.id-mono { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
.role-txt { font-size: 12px; color: var(--muted); }

/* empty state */
.empty-state {
  text-align: center; padding: 3rem 1rem;
  color: var(--muted); font-size: 13px;
}

/* toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 10px 16px;
  font-size: 13px; color: var(--text);
  transform: translateY(80px); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index: 100; max-width: 280px;
  display: flex; align-items: center; gap: 8px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.toast-ok { background: var(--green); }
.toast-err { background: var(--red); }

/* admin view extras */
.admin-zone-tag {
  font-size: 10px; font-family: 'DM Mono', monospace;
  padding: 1px 6px; border-radius: 10px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid rgba(79,124,255,0.2);
}

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .topbar-right .date-txt { display: none; }
  .main-content { padding: 1rem; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div style="display:flex">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-dot">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="login-logo-text">Alertes terrain</div>
        <div class="login-logo-sub">Distribution directe</div>
      </div>
    </div>

    <div class="field-wrap">
      <div class="field-label">Zone</div>
      <div class="select-wrap">
        <select class="styled" id="zone-sel" onchange="onZoneChange()">
          <option value="">— Sélectionner une zone —</option>
          <!-- Zones terrain -->
          <option value="CA">Centre A</option>
          <option value="CB">Centre B</option>
          <option value="CE">Centre Est</option>
          <option value="CO">Centre Ouest</option>
          <option value="ES">Est</option>
          <option value="ES2">Est 2</option>
          <option value="OA">Ouest A</option>
          <option value="SU">Sud</option>
          <option value="AD">Admin — Toutes zones</option>
        </select>
      </div>
    </div>

    <div class="field-wrap">
      <div class="pin-label-row">
        <div class="field-label">Code PIN</div>
        <div class="field-label" style="color:var(--muted);text-transform:none;letter-spacing:0;font-size:11px">4 chiffres</div>
      </div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div class="numpad">
        <button class="num-btn" onclick="addDigit('1')">1</button>
        <button class="num-btn" onclick="addDigit('2')">2</button>
        <button class="num-btn" onclick="addDigit('3')">3</button>
        <button class="num-btn" onclick="addDigit('4')">4</button>
        <button class="num-btn" onclick="addDigit('5')">5</button>
        <button class="num-btn" onclick="addDigit('6')">6</button>
        <button class="num-btn" onclick="addDigit('7')">7</button>
        <button class="num-btn" onclick="addDigit('8')">8</button>
        <button class="num-btn" onclick="addDigit('9')">9</button>
        <button class="num-btn clear" onclick="clearPin()">Effacer</button>
        <button class="num-btn" onclick="addDigit('0')">0</button>
        <button class="num-btn del" onclick="delDigit()">&#9003;</button>
      </div>
    </div>

    <div class="err-msg" id="err-msg"></div>
    <button class="btn-primary" id="login-btn" onclick="tryLogin()" disabled>Accéder</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="topbar-title">Alertes terrain</div>
      <div class="zone-pill" id="zone-pill"></div>
    </div>
    <div class="topbar-right">
      <div class="date-txt" id="date-txt"></div>
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="main-content">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-lbl">Total alertes</div>
        <div class="stat-val c-blue" id="s-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Sans réponse</div>
        <div class="stat-val c-red" id="s-new">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Avec réponse</div>
        <div class="stat-val c-green" id="s-pen">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Taux réponse</div>
        <div class="stat-val c-amber" id="s-res">—</div>
      </div>
    </div>

    <div class="sync-bar" id="sync-bar">
      <div class="sync-dot loading" id="sync-dot"></div>
      <span id="sync-msg">Chargement des alertes...</span>
      <div class="sync-spacer"></div>
      <button class="refresh-btn" onclick="loadAlerts()">↻ Actualiser</button>
    </div>

    <div class="filters">
      <select class="filter-select" id="f-type" onchange="renderTable()">
        <option value="">Tous les types</option>
        <option value="RUP">Rupture stock</option>
        <option value="NV">Client non visité</option>
        <option value="RET">Retard</option>
        <option value="AUT">Autre</option>
      </select>
      <select class="filter-select" id="f-rep" onchange="renderTable()" style="max-width:220px">
        <option value="">Toutes les réponses</option>
      </select>
      <input class="filter-input" id="f-search" placeholder="Rechercher véhicule, client, produit..." oninput="renderTable()"/>
    </div>

    <div class="table-wrap">
      <table>
        <colgroup>
          <col class="c-id"/><col class="c-role"/><col class="c-code"/>
          <col class="c-cli"/><col class="c-prod"/><col class="c-desc"/>
          <col class="c-date"/><col class="c-rep"/><col class="c-com"/>
        </colgroup>
        <thead>
          <tr>
            <th>Id alerte</th>
            <th>Rôle</th>
            <th>Code alerte</th>
            <th>Client</th>
            <th>Produit</th>
            <th>Description</th>
            <th>Date</th>
            <th>Réponse</th>
            <th>Commentaire</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-dot" id="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script>
// ════════════════════════════════════════════════
//  CONFIGURATION — À MODIFIER
// ════════════════════════════════════════════════

// URL de votre Google Apps Script déployé (remplacer par votre URL)
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3dqUzMqyxKZV4vv29Ag-GXyE1x-nmG7v3ud8UvJ8ary6mKBE1_EuGZfciyyKREwNE/exec';

// Code PIN par zone — À PERSONNALISER avant déploiement
const ZONE_PINS = {
  CA:  '1111',  // Centre A
  CB:  '2222',  // Centre B
  CE:  '3333',  // Centre Est
  CO:  '4444',  // Centre Ouest
  ES:  '5555',  // Est
  ES2: '6666',  // Est 2
  OA:  '7777',  // Ouest A
  SU:  '8888',  // Sud
  AD:  '0000'   // Admin — voit toutes les zones
};

const ZONE_LABELS = {
  CA:  'Centre A',
  CB:  'Centre B',
  CE:  'Centre Est',
  CO:  'Centre Ouest',
  ES:  'Est',
  ES2: 'Est 2',
  OA:  'Ouest A',
  SU:  'Sud',
  AD:  'Admin'
};

// ════════════════════════════════════════════════
//  ÉTAT
// ════════════════════════════════════════════════
let pin = '';
let currentZone = null;
let alerts = [];
let saveQueue = {};
let saveTimer = null;

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading-screen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('login-screen').classList.add('active');
    }, 400);
  }, 800);

  const d = new Date();
  document.getElementById('date-txt').textContent =
    d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
});

// ════════════════════════════════════════════════
//  LOGIN / PIN
// ════════════════════════════════════════════════
function onZoneChange() { resetPin(); }

function addDigit(d) {
  if (pin.length >= 4) return;
  pin += d;
  updateDots();
  checkBtn();
  if (pin.length === 4) {
    document.getElementById('login-btn').disabled = !document.getElementById('zone-sel').value;
  }
}

function delDigit() {
  pin = pin.slice(0, -1);
  updateDots(); checkBtn();
}

function clearPin() { pin = ''; updateDots(); checkBtn(); }
function resetPin() { pin = ''; updateDots(); checkBtn(); document.getElementById('err-msg').textContent = ''; }

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d' + i);
    d.className = 'pin-dot' + (i < pin.length ? ' filled' : '');
  }
}

function checkBtn() {
  const z = document.getElementById('zone-sel').value;
  document.getElementById('login-btn').disabled = !(pin.length === 4 && z);
}

function tryLogin() {
  const z = document.getElementById('zone-sel').value;
  if (!z) { document.getElementById('err-msg').textContent = 'Sélectionner une zone.'; return; }
  if (ZONE_PINS[z] !== pin) {
    document.getElementById('err-msg').textContent = 'Code PIN incorrect.';
    // shake dots
    const dots = document.getElementById('pin-dots');
    for (let i = 0; i < 4; i++) document.getElementById('d' + i).classList.add('error');
    setTimeout(() => { pin = ''; updateDots(); }, 800);
    return;
  }
  currentZone = z;
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('zone-pill').textContent = ZONE_LABELS[z];
  populateRepFilter();
  loadAlerts();
}

function logout() {
  currentZone = null; pin = '';
  document.getElementById('zone-sel').value = '';
  updateDots(); checkBtn();
  document.getElementById('err-msg').textContent = '';
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  alerts = [];
}

];

function buildOptions(current) {
  var opts = '<option value="">— Sélectionner une réponse —</option>';
  REPONSES.forEach(function(r) {
    var escaped = r.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    var sel = (current && current.trim() === r.trim()) ? ' selected' : '';
    opts += '<option value="' + escaped + '"' + sel + '>' + escaped + '</option>';
  });
  return opts;
}

function populateRepFilter() {
  var sel = document.getElementById('f-rep');
  REPONSES.forEach(function(r) {
    var opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    sel.appendChild(opt);
  });
}

function repClass(val) {
  if (!val || val === '') return 'rep-new';
  return 'rep-resolved';
}

async function loadAlerts() {
  setSyncState('loading', 'Chargement des alertes...');
  try {
    const url = APPS_SCRIPT_URL + '?method=getAlerts&zone=' + encodeURIComponent(currentZone);
    const res = await fetch(url, { redirect: 'follow' });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch(pe) { throw new Error('Reponse invalide du serveur'); }
    if (data.error) throw new Error(data.error);
    alerts = data.alerts || [];
    setSyncState('ok', alerts.length + ' alerte(s) chargee(s)');
    renderTable();
    updateStats();
  } catch (e) {
    setSyncState('error', 'Erreur : ' + e.message);
    showToast('Erreur chargement : ' + e.message, 'err');
  }
}

function setSyncState(state, msg) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '');
  document.getElementById('sync-msg').textContent = msg;
}

// ════════════════════════════════════════════════
//  RENDU TABLEAU
// ════════════════════════════════════════════════
function getFiltered() {
  const typ = document.getElementById('f-type').value;
  const rep = document.getElementById('f-rep').value;
  const src = document.getElementById('f-search').value.toLowerCase();
  return alerts.filter(a =>
    (!typ || (a.AlerteCode || '').startsWith(typ)) &&
    (!rep || a.Reponse === rep || (rep === '' && (!a.Reponse || a.Reponse === 'new'))) &&
    (!src || [a.IdAlerte, a['Id Alerte'], a['Code Client'], a['Code Produit'], a.Zone].join(' ').toLowerCase().includes(src))
  );
}

function badgeClass(code) {
  if (!code) return 'badge-aut';
  if (code.startsWith('RUP')) return 'badge-rup';
  if (code.startsWith('NV'))  return 'badge-nv';
  if (code.startsWith('RET')) return 'badge-ret';
  return 'badge-aut';
}

function renderTable() {
  const list = getFiltered();
  const isAdmin = currentZone === 'AD';
  const tbody = document.getElementById('tbody');

  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">Aucune alerte trouvée</div></td></tr>`;
    updateStats(list);
    return;
  }

  tbody.innerHTML = list.map(a => {
    const id       = a.IdAlerte || a['Id Alerte'] || '';
    const role     = a.Role || '';
    const typeAl   = a['Type Alerte'] || '';
    const codeProd = a['Code Produit'] || '';
    const client   = a['Code Client'] || '';
    const desc     = a.Description || '';
    const date     = a.Date || '';
    const rep      = a.Reponse || 'new';
    const com      = a.Commentaire || '';
    const badgeCls = typeAl.includes('RUPTURE') ? 'badge-rup'
                   : typeAl.includes('NON_VISITE') || typeAl.includes('CLIENT') ? 'badge-nv'
                   : typeAl.includes('RETARD') ? 'badge-ret' : 'badge-aut';
    return '<tr>' +
      '<td><span class="id-mono">' + esc(id) + '</span>' +
        (isAdmin ? '<br><span class="admin-zone-tag">' + esc(a.Zone||'') + '</span>' : '') +
      '</td>' +
      '<td><span class="role-txt">' + esc(role) + '</span></td>' +
      '<td><span class="badge ' + badgeCls + '">' + esc(typeAl) + '</span></td>' +
      '<td title="' + esc(client) + '">' + esc(client) + '</td>' +
      '<td title="' + esc(codeProd) + '">' + esc(codeProd) + '</td>' +
      '<td title="' + esc(desc) + '">' + esc(desc) + '</td>' +
      '<td style="font-family:DM Mono,monospace;font-size:12px;color:var(--muted)">' + esc(date) + '</td>' +
      '<td>' +
        '<select class="rep-sel ' + repClass(rep) + '" onchange="onRepChange(' + JSON.stringify(id) + ', this)">' +
          buildOptions(rep) +
        '</select>' +
      '</td>' +
      '<td class="wrap">' +
        '<input class="comment-input" type="text" value="' + esc(com) + '" placeholder="Commentaire..." ' +
          'data-id="' + esc(id) + '" onchange="onCommentChange(' + JSON.stringify(id) + ', this.value)"/>' +
      '</td>' +
    '</tr>';
  }).join('');

  updateStats(list);
}

function updateStats(list) {
  const src = list !== undefined ? list : getFiltered();
  const total   = src.length;
  const sans    = src.filter(a => !a.Reponse || a.Reponse === '' || a.Reponse === 'new').length;
  const avec    = total - sans;
  const taux    = total > 0 ? Math.round(avec / total * 100) : 0;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-new').textContent   = sans;
  document.getElementById('s-pen').textContent   = avec;
  document.getElementById('s-res').textContent   = taux + '%';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════
//  RÉPONSE & COMMENTAIRE — sauvegarde
// ════════════════════════════════════════════════
function onRepChange(id, sel) {
  const a = alerts.find(x => x.IdAlerte === id);
  if (a) a.Reponse = sel.value;
  sel.className = 'rep-sel ' + repClass(sel.value);
  updateStats();
  scheduleSave(id, { Reponse: sel.value });
}

function onCommentChange(id, val) {
  const a = alerts.find(x => x.IdAlerte === id);
  if (a) a.Commentaire = val;
  scheduleSave(id, { Commentaire: val });
}

function scheduleSave(id, fields) {
  saveQueue[id] = { ...(saveQueue[id] || {}), ...fields };
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 1200);
}

async function flushSave() {
  const batch = Object.entries(saveQueue).map(([id, fields]) => {
    const a = alerts.find(x => x.IdAlerte === id) || {};
    return { IdAlerte: id, Zone: a.Zone || currentZone, ...fields };
  });
  saveQueue = {};
  let hasError = false;
  for (const item of batch) {
    try {
      const url = APPS_SCRIPT_URL
        + '?method=saveResponse'
        + '&zone='        + encodeURIComponent(item.Zone || currentZone)
        + '&IdAlerte='    + encodeURIComponent(item.IdAlerte || '')
        + '&Reponse='     + encodeURIComponent(item.Reponse || '')
        + '&Commentaire=' + encodeURIComponent(item.Commentaire || '');
      const res  = await fetch(url, { redirect: 'follow' });
      const text = await res.text();
      const data = JSON.parse(text);
      if (!data.ok) { hasError = true; showToast('Erreur : ' + (data.error || 'inconnue'), 'err'); }
    } catch (e) {
      hasError = true;
      showToast('Erreur sauvegarde : ' + e.message, 'err');
    }
  }
  if (!hasError) showToast('Enregistre dans le Sheet', 'ok');
}

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-dot').className = `toast-dot toast-${type}`;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
